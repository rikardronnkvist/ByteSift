name: Deploy To Azure

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-azure-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Verify Azure CLI
        run: az version

      - name: Deploy Static Site
        shell: pwsh
        run: |
          ./scripts/bs-deploy-webapp.ps1 `
            -ResourceGroup "${{ vars.AZURE_RESOURCE_GROUP || 'rg-bytesift' }}" `
            -Location "${{ vars.AZURE_LOCATION || 'swedencentral' }}" `
            -StorageAccount "${{ vars.AZURE_STORAGE_ACCOUNT || 'stbytesift' }}"